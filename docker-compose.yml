version: "3.9"

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eventforge-bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eventforge-net

  postgres:
    image: postgres:16-alpine
    container_name: eventforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: eventforge
      POSTGRES_PASSWORD: eventforge_secret
      POSTGRES_DB: eventforge
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventforge"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - eventforge-net

  redis:
    image: redis:7-alpine
    container_name: eventforge-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - eventforge-net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: eventforge-pgadmin
    restart: unless-stopped
    profiles:
      - dev
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@eventforge.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin_secret}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - eventforge-net

volumes:
  postgres-data:
  redis-data:

networks:
  eventforge-net:
    driver: bridge
